<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Municipal Waste Monitoring System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#0f766e,#059669);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
        }

        .login-card{
            width:420px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .system-title{
            text-align:center;
            color:#0f766e;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .btn-login{
            background:#059669;
            border:none;
            width:100%;
            padding:12px;
            font-size:18px;
        }

        .btn-login:hover{
            background:#047857;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <h2 class="system-title">
            ♻ Smart City
        </h2>

        <p class="subtitle">
            Municipal Waste Monitoring System
        </p>

        {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-success btn-login">

                Login

            </button>

        </form>

    </div>

</body>
</html>
