{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>
                🏘 Ward Management
            </h3>

        </div>

        <div class="card-body">

            <a href="/wards/add/"
               class="btn btn-success mb-3">

                ➕ Add Ward

            </a>

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Ward Name</th>
                        <th>Zone</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    {% for ward in wards %}

                    <tr>

                        <td>{{ ward.ward_name }}</td>

                        <td>{{ ward.zone.zone_name }}</td>

                        <td>

                            <a href="/wards/edit/{{ ward.id }}/"
                               class="btn btn-warning btn-sm">

                                ✏️ Edit

                            </a>

                            <a href="/wards/delete/{{ ward.id }}/"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this ward?')">

                                🗑 Delete

                            </a>

                        </td>

                    </tr>

                    {% empty %}

                    <tr>

                        <td colspan="3"
                            class="text-center">

                            No wards found

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
