{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>
                ✏️ Edit Zone
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-warning">

                    Update Zone

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
