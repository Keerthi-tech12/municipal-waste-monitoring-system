{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>
                🌍 Zone Management
            </h3>

        </div>

        <div class="card-body">

            <a href="/zones/add/"
               class="btn btn-success mb-3">

               ➕ Add Zone

            </a>

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Zone Name</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    {% for zone in zones %}

                    <tr>

                        <td>
                            {{ zone.zone_name }}
                        </td>

                        <td>

                            <a href="/zones/edit/{{ zone.id }}/"
                               class="btn btn-warning btn-sm">

                                ✏️ Edit

                            </a>

                            <a href="/zones/delete/{{ zone.id }}/"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this zone?')">

                                🗑 Delete

                            </a>

                        </td>

                    </tr>

                    {% empty %}

                    <tr>

                        <td colspan="2"
                            class="text-center">

                            No zones found

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
